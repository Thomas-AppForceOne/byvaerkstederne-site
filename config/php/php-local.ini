; Edit this file to override php.ini directives

; Security: Session cookie hardening (Sprint 4 security review)
; Prevents JavaScript access to session cookie (XSS mitigation)
session.cookie_httponly = 1
; Only send session cookie over HTTPS in production
session.cookie_secure = 1
; Prevent CSRF via cross-site cookie sending (Lax allows same-site GET, blocks cross-site POST)
session.cookie_samesite = "Lax"
; Regenerate session ID at a reasonable interval
session.gc_maxlifetime = 3600
