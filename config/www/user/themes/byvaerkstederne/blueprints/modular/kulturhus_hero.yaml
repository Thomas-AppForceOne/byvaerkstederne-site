title: Kulturhus Hero
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Kulturhus Hero
          fields:
            header.label:
              type: text
              label: Label tekst
              default: Vores Fælles Fristed
            header.hero_heading:
              type: text
              label: Overskrift
              default: Kulturhus
            header.subtitle:
              type: textarea
              label: Undertekst
              rows: 3
            header.bg_image_url:
              type: text
              label: Baggrundsbillede URL
            header.buttons:
              type: list
              label: Knapper
              fields:
                .text:
                  type: text
                  label: Knap tekst
                .url:
                  type: text
                  label: Link URL
                .style:
                  type: select
                  label: Stil
                  default: secondary
                  options:
                    primary: Primær (grøn)
                    secondary: Sekundær (blå)
                    outlined: Outlined (ramme)
                    dark: Mørk
