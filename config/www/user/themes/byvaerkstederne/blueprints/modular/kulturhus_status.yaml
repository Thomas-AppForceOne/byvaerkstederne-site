title: Kulturhus Status
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Kulturhus Status
          fields:
            header.section_title:
              type: text
              label: Sektion overskrift
              default: Hvad laver vi lige nu?
            header.status_label:
              type: text
              label: Status label
              help: Farvet tekst under overskriften
            header.progress_title:
              type: text
              label: Fremskridt titel
            header.progress_percent:
              type: text
              label: Fremskridt procent
              help: Tal mellem 0 og 100
            header.cards:
              type: list
              label: Statuskort
              fields:
                .icon:
                  type: text
                  label: Ikon
                  help: Material Symbols ikonavn (f.eks. "construction")
                .title:
                  type: text
                  label: Titel
                .description:
                  type: textarea
                  label: Beskrivelse
                  rows: 2
                .bg:
                  type: text
                  label: Baggrundsfarve (CSS)
                  help: Valgfrit - f.eks. "var(--surface-container-low)"
