title: Værksted Detaljer
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Værksted Detaljer
          fields:
            header.section_title:
              type: text
              label: Sektion overskrift
              default: Hvad laver vi lige nu?
            header.accent:
              type: select
              label: Accent farve
              default: tertiary
              options:
                primary: Grøn (primary)
                secondary: Blå (secondary)
                tertiary: Terracotta (tertiary)
            header.projects:
              type: list
              label: Projekter
              fields:
                .number:
                  type: text
                  label: Nummer
                  help: F.eks. "01" eller "Fase 1"
                .title:
                  type: text
                  label: Titel
                .description:
                  type: textarea
                  label: Beskrivelse
                  rows: 2
            header.cta_text:
              type: text
              label: CTA knap tekst
              help: Lad være tom for at skjule knappen
            header.cta_url:
              type: text
              label: CTA link URL
            header.progress_title:
              type: text
              label: Fremskridt titel
            header.progress_percent:
              type: text
              label: Fremskridt procent
              help: Tal mellem 0 og 100
            header.progress_stage:
              type: text
              label: Fremskridt fase
              default: Etablering i gang
            header.progress_note:
              type: text
              label: Fremskridt note
            header.wishlist_title:
              type: text
              label: Ønskeliste overskrift
              default: Ønskeliste
            header.wishlist:
              type: list
              label: Ønskeliste
              fields:
                .name:
                  type: text
                  label: Navn
                .note:
                  type: text
                  label: Note
                .done:
                  type: toggle
                  label: Opnået
                  highlight: 1
                  default: 0
                  options:
                    1: Ja
                    0: Nej
