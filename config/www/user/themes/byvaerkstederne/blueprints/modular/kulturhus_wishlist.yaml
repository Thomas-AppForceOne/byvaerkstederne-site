title: Kulturhus Ønskeliste
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Kulturhus Ønskeliste
          fields:
            header.section_title:
              type: text
              label: Sektion overskrift
              default: Vores Ønskeliste
            header.section_subtitle:
              type: textarea
              label: Undertekst
              rows: 2
            header.donate_heading:
              type: text
              label: Donation overskrift
              default: Støt os økonomisk
            header.donate_text:
              type: textarea
              label: Donation tekst
              default: Alle bidrag går ubeskåret til inventar og udstyr til huset.
              rows: 2
            header.donate_cta:
              type: text
              label: Donation knap tekst
              default: Donér via MobilePay
            header.donate_url:
              type: text
              label: Donation link URL
            header.items:
              type: list
              label: Ønsker
              fields:
                .icon:
                  type: text
                  label: Ikon
                  help: Material Symbols ikonavn (f.eks. "speaker")
                .name:
                  type: text
                  label: Navn
                .description:
                  type: textarea
                  label: Beskrivelse
                  rows: 2
