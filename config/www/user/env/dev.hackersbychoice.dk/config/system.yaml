# Pin Grav's base URL for the dev tier.
#
# Why this exists: one.com maps `dev.hackersbychoice.dk` to the `dev/`
# subfolder under the apex docroot, but the underlying Apache+PHP
# DOCUMENT_ROOT remains the apex (`httpd.www`). When mod_rewrite
# rewrites a non-existent path like `/vedtaegter` to `index.php`, the
# resolved SCRIPT_NAME becomes `/dev/index.php` (apex-relative). Grav's
# URI parser then computes its base as `/dev`, which:
#   - Prefixes every emitted URL with `/dev/` (theme assets, links).
#   - Mis-computes `Uri::route()` so page dispatches return `/`,
#     causing every non-home page to 404.
#
# The homepage avoids this because Apache serves DirectoryIndex without
# a rewrite, leaving SCRIPT_NAME clean as `/index.php`.
#
# Pinning `custom_base_url` to the canonical subdomain URL bypasses
# Grav's auto-detection entirely. Same fix applies to test/, and
# anywhere else this docroot-mapping quirk surfaces.
custom_base_url: 'https://dev.hackersbychoice.dk'
absolute_urls: false
