# Public-demo environment profile.
#
# This profile is active when the site is served under the host
# `public-demo.example.com` (see adjacent README.md for how ops maps the
# real public-demo hostname to this directory).
#
# The `enabled` map is intentionally empty. Every catalogue flag therefore
# resolves to `false` per the FlagStore "missing key" rule, which is the
# defined secure default for the public-demo profile: no roadmap, no bug
# report surface, no feature suggestion surface, no community footer
# column, no membership / newsletter / event / press / minutes / workshop
# calendar / workshop detail / contact / statutes pages.
#
# DO NOT add flags here — adding a key flips a surface ON for public-demo.
# If you need a single flag enabled for a one-off preview, make that
# decision explicit in a code review, not a silent YAML edit.
#
# The file contains flag metadata only. No credentials, tokens, API keys,
# or secrets of any kind may appear in this file; FlagStore will log a
# warning and fail closed for any non-`"true"`/`"false"` value anyway.
enabled: {}
