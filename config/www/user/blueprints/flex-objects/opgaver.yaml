title: Opgaver
description: To-do opgaver for værkstedsgrupperne
type: flex-objects

config:
  admin:
    list:
      title: title
      fields:
        published:
          field:
            type: toggle
            label: Aktiv
          width: 8
        title:
          link: edit
        group:
          field:
            type: text
          width: 16
        status:
          field:
            type: text
          width: 12
        updated_timestamp:
          label: Opdateret
    edit:
      title:
        template: '{{ object.title ?? ''Ny opgave'' }}'
    configure:
      authorize: admin.super

  data:
    object: 'Grav\Common\Flex\Types\Generic\GenericObject'
    collection: 'Grav\Common\Flex\Types\Generic\GenericCollection'
    index: 'Grav\Common\Flex\Types\Generic\GenericIndex'
    storage:
      class: 'Grav\Framework\Flex\Storage\SimpleStorage'
      options:
        formatter:
          class: 'Grav\Framework\File\Formatter\YamlFormatter'
        folder: user-data://flex-objects/opgaver.yaml
    search:
      options:
        contains: 1
      fields:
        - title
        - description

form:
  validation: loose
  fields:
    published:
      type: toggle
      label: Aktiv
      highlight: 1
      default: 1
      options:
        1: Ja
        0: Nej
      validate:
        type: bool

    title:
      type: text
      label: Opgave titel
      validate:
        required: true

    description:
      type: textarea
      label: Beskrivelse
      rows: 3

    group:
      type: select
      label: Værkstedsgruppe
      validate:
        required: true
      options:
        alle: Alle grupper (fælles)
        makerspace: Makerspace & Reparation
        kreativ: Krea Café
        groenne: Grønt BYværksted
        kulturhus: Eventværkstedet

    status:
      type: select
      label: Status
      default: open
      options:
        open: Åben
        in_progress: I gang
        done: Færdig

    priority:
      type: select
      label: Prioritet
      default: medium
      options:
        high: Høj
        medium: Medium
        low: Lav

    assigned_to:
      type: text
      label: Ansvarlig
      help: Navn på den ansvarlige person

    due_date:
      type: text
      label: Frist
      help: "F.eks. 2026-05-01"
